<div class="stems-page">

  <div class="stems-header">
    <div>
      <p class="section-tag">// Separação concluída</p>
      <h2 class="stems-title">{{ statusData.title || 'Suas faixas' }}</h2>
      <p class="stems-sub">6 stems isolados prontos para download</p>
    </div>
    <div class="stems-actions">
      <button class="btn-outline" (click)="reset.emit()">← Nova música</button>
      <button class="btn-primary" (click)="showMixer.set(true)">Mixer →</button>
    </div>
  </div>

  <div class="stems-grid">
    @for (stem of stems; track stem.key) {
      <div class="stem-card">
        <div class="stem-header">
          <div class="stem-icon" [style.color]="stem.color">{{ stem.icon }}</div>
          <div>
            <h3 class="stem-label">{{ stem.label }}</h3>
            <p class="stem-key">{{ stem.key }}</p>
          </div>
          <a
            [href]="getStemUrl(stem.key)"
            download
            class="stem-download"
            [style.border-color]="stem.color + '40'"
            [style.color]="stem.color"
          >↓</a>
        </div>
        <div class="stem-player">
          <audio controls [src]="getStemUrl(stem.key)" preload="none">
            Seu navegador não suporta áudio.
          </audio>
        </div>
      </div>
    }
  </div>

  @if (showMixer()) {
    <app-mixer
      [separationId]="statusData.separation_id"
      [stems]="stems"
      (close)="showMixer.set(false)"
    />
  }

</div>
